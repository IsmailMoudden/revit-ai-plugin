name: Build Installer ZIP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BimAiAssistant.csproj

      - name: Build Release x64
        run: dotnet build BimAiAssistant.csproj -c Release -p:Platform=x64 --no-restore

      - name: Assemble and ZIP
        shell: pwsh
        run: |
          # Locate the DLL — path varies by platform target (x64 adds a subfolder)
          $dll = Get-ChildItem -Recurse -Filter "BimAiAssistant.dll" -Path "bin" |
                   Where-Object { $_.FullName -notmatch "\\ref\\" } |
                   Select-Object -First 1

          if (-not $dll) {
            Write-Host "bin\ tree:"
            Get-ChildItem -Recurse "bin" | Select-Object FullName
            Write-Error "BimAiAssistant.dll not found anywhere under bin\"
            exit 1
          }

          $out     = $dll.DirectoryName
          Write-Host "Using build output: $out"
          $staging = "$env:RUNNER_TEMP\BIMAI"

          Write-Host "Build output:"
          Get-ChildItem $out | Select-Object Name

          New-Item -ItemType Directory -Path $staging | Out-Null

          Copy-Item "$out\BimAiAssistant.dll"  $staging
          Copy-Item "$out\Newtonsoft.Json.dll" $staging
          Copy-Item "Installer\install.bat"    $staging
          Copy-Item "Installer\uninstall.bat"  $staging
          Copy-Item "Installer\README.txt"     $staging

          Write-Host "Staged:"
          Get-ChildItem $staging | Select-Object Name

          $wrapper = "$env:RUNNER_TEMP\pkg"
          New-Item -ItemType Directory -Path $wrapper | Out-Null
          Copy-Item $staging "$wrapper\BIMAI" -Recurse

          Compress-Archive -Path "$wrapper\BIMAI" `
            -DestinationPath "$env:RUNNER_TEMP\BIMAI_Installer.zip" -Force

          Write-Host "ZIP ready."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BIMAI_Installer
          path: ${{ runner.temp }}\BIMAI_Installer.zip
          retention-days: 30
